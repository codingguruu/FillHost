
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telegram Uploader + URL Generator</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h2 { text-align: center; }
    input[type="file"] { margin: 15px 0; }
    button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #45a049; }
    .preview { margin-top: 10px; max-width: 100%; }
    .output { margin-top: 15px; padding: 10px; background: #eef; border-radius: 5px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Telegram File Uploader</h2>
    <input type="file" id="fileInput" />
    <br />
    <button onclick="uploadFile()">Upload</button>
    <img id="preview" class="preview" />
    <div class="output" id="output"></div>
  </div>

  <script>
    const botToken = "7769261812:AAE3d6r81NabIGUqsN8dutuc50OKUZiiHQw";
    const chatId = "1257066882";

    const fileInput = document.getElementById("fileInput");
    const output = document.getElementById("output");
    const preview = document.getElementById("preview");

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (file && file.type.startsWith("image/")) {
        const reader = new FileReader();
        reader.onload = e => {
          preview.src = e.target.result;
        };
        reader.readAsDataURL(file);
      } else {
        preview.src = "";
      }
    });

    async function uploadFile() {
      const file = fileInput.files[0];
      if (!file) return alert("Please select a file first.");

      const formData = new FormData();
      formData.append("photo", file);

      output.innerText = "Uploading to Telegram...";

      try {
        const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto?chat_id=${chatId}`, {
          method: "POST",
          body: formData,
        });

        const data = await response.json();
        if (data.ok) {
          const fileId = data.result.photo.pop().file_id;
          output.innerText = "Uploaded! Fetching direct link...";
          const fileInfo = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`);
          const fileJson = await fileInfo.json();

          if (fileJson.ok) {
            const filePath = fileJson.result.file_path;
            const fileUrl = `https://api.telegram.org/file/bot${botToken}/${filePath}`;
            output.innerHTML = `<strong>Direct URL:</strong><br><a href="${fileUrl}" target="_blank">${fileUrl}</a>`;
          } else {
            output.innerText = "Uploaded but failed to get file path.";
          }
        } else {
          output.innerText = "Upload failed.";
        }
      } catch (err) {
        console.error(err);
        output.innerText = "Error uploading file.";
      }
    }
  </script>
</body>
</html>
